<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="coffeeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6F4E37"/>
      <stop offset="100%" style="stop-color:#4A3728"/>
    </linearGradient>
  </defs>
  <!-- Tray -->
  <rect x="50" y="140" width="200" height="10" rx="2" fill="#8B7355"/>
  <!-- Cup -->
  <path d="M100 60 L100 140 Q100 155 120 155 L180 155 Q200 155 200 140 L200 60 Z" fill="url(#coffeeGrad)"/>
  <!-- Cup rim -->
  <ellipse cx="150" cy="60" rx="50" ry="12" fill="#5D4037"/>
  <ellipse cx="150" cy="60" rx="45" ry="10" fill="#6F4E37"/>
  <!-- Handle -->
  <path d="M200 80 Q230 80 230 110 Q230 140 200 140" stroke="#6F4E37" stroke-width="10" fill="none"/>
  <!-- Steam -->
  <path d="M130 35 Q135 20 130 10" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M150 30 Q158 15 150 5" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M170 35 Q175 20 170 10" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Saucer -->
  <ellipse cx="150" cy="160" rx="70" ry="10" fill="#D4A84B"/>
</svg>