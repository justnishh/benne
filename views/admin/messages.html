<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — Benne Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-logo">
        <h2>Benne</h2>
        <span>Admin Panel</span>
      </div>
      <ul class="sidebar-nav">
        <li><a href="/admin/dashboard">Dashboard</a></li>
        <div class="divider"></div>
        <li><a href="/admin/home">Home Page</a></li>
        <li><a href="/admin/menu">Menu</a></li>
        <li><a href="/admin/about">About Page</a></li>
        <li><a href="/admin/contact">Contact Page</a></li>
        <li><a href="/admin/messages" class="active">Messages</a></li>
        <li><a href="/admin/faq">FAQs</a></li>
        <li><a href="/admin/privacy">Privacy Policy</a></li>
        <li><a href="/admin/terms">Terms</a></li>
        <div class="divider"></div>
        <li><a href="/admin/settings">Settings</a></li>
        <li><a href="/admin/media">Media Library</a></li>
        <div class="divider"></div>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </nav>
    <main class="main-content">
      <h1 class="page-title">Messages</h1>
      <p class="page-subtitle">Customer inquiries from the contact form.</p>

      <div class="stats-grid" id="messageStats">
        <div class="stat-card">
          <div class="number" id="statTotal">-</div>
          <div class="label">Total Messages</div>
        </div>
        <div class="stat-card">
          <div class="number" id="statUnread">-</div>
          <div class="label">Unread</div>
        </div>
      </div>

      <div class="admin-card">
        <div class="message-filters" id="messageFilters">
          <button class="admin-tab active" data-filter="all">All</button>
          <button class="admin-tab" data-filter="unread">Unread</button>
          <button class="admin-tab" data-filter="read">Read</button>
        </div>
        <div id="messagesContainer"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="/js/admin.js"></script>
  <script>initMessages();</script>
</body>
</html>
