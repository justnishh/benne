<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Privacy Policy — Benne Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-logo"><h2>Benne</h2><span>Admin Panel</span></div>
      <ul class="sidebar-nav">
        <li><a href="/admin/dashboard">Dashboard</a></li>
        <div class="divider"></div>
        <li><a href="/admin/home">Home Page</a></li>
        <li><a href="/admin/menu">Menu</a></li>
        <li><a href="/admin/about">About Page</a></li>
        <li><a href="/admin/contact">Contact Page</a></li>
        <li><a href="/admin/faq">FAQs</a></li>
        <li><a href="/admin/privacy" class="active">Privacy Policy</a></li>
        <li><a href="/admin/terms">Terms</a></li>
        <div class="divider"></div>
        <li><a href="/admin/settings">Settings</a></li>
        <li><a href="/admin/media">Media Library</a></li>
        <div class="divider"></div>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </nav>
    <main class="main-content">
      <h1 class="page-title">Privacy Policy</h1>
      <p class="page-subtitle">Edit sections of the privacy policy. Content supports HTML.</p>

      <form id="legalForm">
        <div class="admin-card">
          <h3>Page Header</h3>
          <div class="form-row">
            <div class="form-group"><label>Title</label><input id="legalPageTitle"></div>
            <div class="form-group"><label>Subtitle</label><input id="legalPageSubtitle"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Effective Date</label><input id="legalEffDate"></div>
            <div class="form-group"><label>Last Updated</label><input id="legalUpdated"></div>
          </div>
          <div class="form-group"><label>Intro (HTML)</label><textarea id="legalIntro"></textarea></div>
        </div>

        <div style="margin-bottom:16px">
          <button type="button" class="btn btn-sm btn-secondary" onclick="addLegalSection()">+ Add Section</button>
        </div>

        <div id="legalSections"></div>

        <button type="submit" class="btn btn-primary">Save Privacy Policy</button>
        <a href="/privacy.html" target="_blank" class="btn btn-secondary" style="margin-left:10px">Preview</a>
      </form>
    </main>
  </div>
  <script src="/js/admin.js"></script>
  <script>initLegalEditor('privacy');</script>
</body>
</html>
