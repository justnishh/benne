<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Benne</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Benne</h1>
      <p class="subtitle">Admin Panel</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Login</button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:0.82rem;color:var(--coffee-light)">
        <a href="/" style="color:var(--teal)">Back to website</a>
      </p>
    </div>
  </div>
  <script src="/js/admin.js"></script>
  <script>initLogin();</script>
</body>
</html>
