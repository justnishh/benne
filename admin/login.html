<!DOCTYPE html>
<html lang=""en"">
<head>
    <meta charset=""UTF-8"">
    <meta name=""viewport"" content=""width=device-width, initial-scale=1.0"">
    <title>Admin Login - Benne</title>
    <link rel=""stylesheet"" href=""../css/admin.css"">
    <link rel=""icon"" href=""../../images/favicon.svg"">
    <link rel=""preconnect"" href=""https://fonts.googleapis.com"">
    <link rel=""preconnect"" href=""https://fonts.gstatic.com"" crossorigin>
    <link href=""https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"" rel=""stylesheet"">
    <link rel=""stylesheet"" href=""https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"">
    <style>
        body { 
            background: linear-gradient(135deg, #8B4513 0%, #3a2a1f 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0;
            font-family: 'DM Sans', sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .login-logo { text-align: center; margin-bottom: 30px; }
        .login-logo img { max-width: 150px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input { 
            width: 100%; 
            padding: 12px 16px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group input:focus { border-color: #8B4513; outline: none; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover { background: #6d3610; }
        .error { color: #dc3545; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class=""login-card"">
        <div class=""login-logo"">
            <img src=""../../images/Benne_logo-02.png"" alt=""Benne"">
        </div>
        <form id=""loginForm"">
            <div class=""form-group"">
                <label>Email</label>
                <input type=""email"" id=""email"" required placeholder=""admin@benne.in"">
            </div>
            <div class=""form-group"">
                <label>Password</label>
                <input type=""password"" id=""password"" required placeholder=""Enter password"">
            </div>
            <button type=""submit"" class=""btn-login"">Login</button>
            <p class=""error"" id=""error"">Invalid credentials</p>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simple admin credentials
            if (email === 'admin@benne.in' && password === 'benne123') {
                localStorage.setItem('benneAdminLoggedIn', 'true');
                localStorage.setItem('benneAdminEmail', email);
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
